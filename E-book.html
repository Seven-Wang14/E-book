<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-book</title>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .book-wrapper {
      width: 100%;
      height: calc(100% - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #pdf-view {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .side-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #e0e0e0;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      z-index: 90;
      display: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .side-btn:hover { opacity: 1; }
    #leftBtn { left: 20px; }
    #rightBtn { right: 20px; }
    body.desktop .side-btn { display: block; }

    .control-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      transition: transform 0.3s ease;
      z-index: 99;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }
    .control-bar.hide { transform: translateX(-50%) translateY(120%); }
    .fold-btn {
      background: #e0e0e0;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }
   
    .unfold-btn {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #e0e0e0;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      color: #666;
      z-index: 100;
      display: none;
    }
    .unfold-btn.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      padding: 6px 12px;
      background: #e0e0e0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:disabled {
      background: #eeeeee;
      color: #999;
      cursor: not-allowed;
    }

    .page-text {
      font-size: 14px;
      color: #444;
      min-width: 90px;
      text-align: center;
    }

    .jump-input {
      width: 50px;
      padding: 6px;
      text-align: center;
      border: none;
      border-radius: 8px;
      background: #f0f0f0;
      outline: none;
    }


    .modal-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
  
    .modal-box {
      background: #fff;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      text-align: center;
    }
    
    .link-text {
      font-size: 16px;
      color: #0066cc;
      text-decoration: none;
    }
    .link-text:hover {
      text-decoration: underline;
    }
    
    .close-modal {
      margin-top: 20px;
      padding: 5px 15px;
      border: none;
      border-radius: 6px;
      background: #e0e0e0;
      cursor: pointer;
    }

   
    @media (max-width: 768px) {
      .control-bar { gap: 8px; padding: 8px 12px; }
      .side-btn { display: none !important; }
    }
  </style>
</head>

<body>
  <div class="book-wrapper">
    <canvas id="pdf-view"></canvas>
  </div>

  
  <button class="side-btn" id="leftBtn">←</button>
  <button class="side-btn" id="rightBtn">→</button>

  <div class="control-bar" id="controlBar">
    <button class="fold-btn" id="foldBtn">∨</button>
    <button class="btn" id="prev">上一页</button>
    <div class="page-text">
      <span id="current">1</span> / <span id="total">0</span>
    </div>
    <button class="btn" id="next">下一页</button>
    <input type="number" class="jump-input" id="jump" min="1" placeholder="页">
    <button class="btn" id="go">前往</button>

    <button class="btn" id="openSourceBtn">开源</button>
  </div>

  <button class="unfold-btn" id="unfoldBtn">∧</button>

  <div class="modal-mask" id="modalMask">
    <div class="modal-box">
      <!--website-->
      <a href="" target="_blank" class="link-text">Github开源文档</a>
      <br>
      <button class="close-modal" id="closeModal">关闭</button>
    </div>
  </div>

  <script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';

    // DOM
    const canvas = document.getElementById('pdf-view');
    const ctx = canvas.getContext('2d');
    const currentPage = document.getElementById('current');
    const totalPage = document.getElementById('total');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const jumpInput = document.getElementById('jump');
    const goBtn = document.getElementById('go');
    const controlBar = document.getElementById('controlBar');
    const foldBtn = document.getElementById('foldBtn');
    const unfoldBtn = document.getElementById('unfoldBtn');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const openSourceBtn = document.getElementById('openSourceBtn');
    const modalMask = document.getElementById('modalMask');
    const closeModal = document.getElementById('closeModal');

    let pdfDoc = null;
    let pageNow = 1;
    let isRendering = false;
    let waitPage = null;
    const PDF_FILE = 'book.pdf';

    // Device judgement(possible)
    function isMobile() {
      return /Android|webOS|iPhone|iPad/i.test(navigator.userAgent);
    }
    if (!isMobile()) document.body.classList.add('desktop');

    function renderPage(num) {
      if (isRendering) {
        waitPage = num;
        return;
      }
      isRendering = true;

      pdfDoc.getPage(num).then(page => {
        const wrapper = document.querySelector('.book-wrapper');
        const maxW = wrapper.clientWidth;
        const maxH = wrapper.clientHeight;
        const dpr = window.devicePixelRatio || 1;

        const originViewport = page.getViewport({ scale: 1 });
        const fitScale = Math.min(maxW / originViewport.width, maxH / originViewport.height);
        const finalScale = fitScale * dpr;
        const viewport = page.getViewport({ scale: finalScale });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        page.render({ canvasContext: ctx, viewport }).promise.then(() => {
          pageNow = num;
          currentPage.textContent = num;
          isRendering = false;

          if (waitPage !== null) {
            const next = waitPage;
            waitPage = null;
            renderPage(next);
          }
        });
      });
    }

    const prevPage = () => { if (pageNow > 1) renderPage(pageNow - 1); };
    const nextPage = () => { if (pageNow < pdfDoc.numPages) renderPage(pageNow + 1); };
    const goFirst = () => renderPage(1);
    const goLast = () => renderPage(pdfDoc.numPages);

    const jumpPage = () => {
      const p = parseInt(jumpInput.value);
      if (p >= 1 && p <= pdfDoc.numPages) {
        renderPage(p);
      }
      jumpInput.value = '';
    };

    foldBtn.addEventListener('click', () => {
      controlBar.classList.add('hide');
      unfoldBtn.classList.add('show');
    });
    unfoldBtn.addEventListener('click', () => {
      controlBar.classList.remove('hide');
      unfoldBtn.classList.remove('show');
    });

    leftBtn.addEventListener('click', prevPage);
    rightBtn.addEventListener('click', nextPage);
    prevBtn.addEventListener('click', prevPage);
    nextBtn.addEventListener('click', nextPage);
    goBtn.addEventListener('click', jumpPage);
    jumpInput.addEventListener('keyup', e => { if (e.key === 'Enter') jumpPage(); });

    document.addEventListener('keydown', e => {
      if (isMobile() || !pdfDoc) return;
      e.preventDefault();
      switch (e.key) {
        case 'ArrowLeft':
        case 'PageUp':
          prevPage();
          break;
        case 'ArrowRight':
        case 'PageDown':
          nextPage();
          break;
        case 'Home':
          goFirst();
          break;
        case 'End':
          goLast();
          break;
      }
    });

    window.addEventListener('resize', () => {
      if (pdfDoc) renderPage(pageNow);
    });

    openSourceBtn.addEventListener('click', () => {
      modalMask.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
      modalMask.style.display = 'none';
    });

    modalMask.addEventListener('click', (e) => {
      if (e.target === modalMask) {
        modalMask.style.display = 'none';
      }
    });

    pdfjs.getDocument(PDF_FILE).promise.then(doc => {
      pdfDoc = doc;
      totalPage.textContent = doc.numPages;
      renderPage(1);
    });
  </script>
</body>
</html>
