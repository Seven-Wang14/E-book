<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-book</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: "SimSun", "Microsoft YaHei", serif;}
        body {background: #f0f0f0;display: flex;justify-content: center;align-items: center;min-height: 100vh;padding: 20px;}
        .a4-box {width: 210mm;height: 297mm;background: white;box-shadow: 0 0 10px #ccc;position: relative;overflow: hidden;}
        #pdfCanvas {
            width: 100%;
            height: 100%;
            transform: var(--transform-type);
            transform-origin: center;
            image-rendering: optimizeQuality;
            -webkit-font-smoothing: antialiased;
        }
        .page-control {position: absolute;top: 10mm;left: 0;width: 100%;text-align: center;z-index: 10;background: rgba(255,255,255,0.9);padding: 5px 0;}
        .page-input {width: 40px;height: 24px;border: 1px solid #ccc;border-radius: 3px;text-align: center;font-size: 16px;color: #666;outline: none;padding: 0 2px;}
        .nav-btn {position: absolute;top: 50%;transform: translateY(-50%);width: 40px;height: 40px;border: none;background: #f8f5f0;color: #333;font-size: 20px;border-radius: 50%;cursor: pointer;z-index: 10;}
        .nav-btn:disabled {background: #e9e9e9;color: #bbb;cursor: not-allowed;}
        .prev-btn {left: 10mm;}
        .next-btn {right: 10mm;}
        @media (max-width: 850px) {
            .a4-box {width: 90vw;height: calc(90vw * 1.414);}
            .nav-btn {width: 30px;height: 30px;font-size: 16px;}
            .page-input {width: 35px;height: 20px;font-size: 14px;}
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="a4-box">
        <div class="page-control">
            <input type="text" class="page-input" id="pageNum" value="1">
            <span id="totalPage">/ 0</span>
        </div>
        <button class="nav-btn prev-btn" id="prevBtn" disabled>←</button>
        <button class="nav-btn next-btn" id="nextBtn" disabled>→</button>
        <canvas id="pdfCanvas"></canvas>
    </div>

    <script>
       
        const PDF_NAME = "Your book's name.pdf"; 
        const FIX_DIRECTION = 0;    
        let pdfDoc = null, curPage = 1, totalPage = 0;
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        window.onload = async () => {
            
            const transformMap = ['none', 'rotate(180deg)', 'scaleX(-1)', 'scaleY(-1)', 'scale(-1, -1)'];
            document.documentElement.style.setProperty('--transform-type', transformMap[FIX_DIRECTION]);

            try {
               
                pdfDoc = await pdfjs.getDocument({
                    url: PDF_NAME,
                    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
                    cMapPacked: true
                }).promise;
                totalPage = pdfDoc.numPages;
                document.getElementById('totalPage').textContent = '/' + totalPage;
                await renderPage(curPage);
                updateBtnStatus();
            } catch (e) {
                
                const canvas = document.getElementById('pdfCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                ctx.font = "16px 微软雅黑";
                ctx.fillStyle = "#ff0000";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("加载失败：" + e.message, canvas.width/2, canvas.height/2 - 20);
                ctx.fillText("PDF与HTML放同一文件夹，文件名无空格", canvas.width/2, canvas.height/2 + 10);
                return;
            }

           
            document.getElementById('prevBtn').onclick = async () => {
                if (curPage > 1) await renderPage(--curPage);
                updateBtnStatus();
            };
            document.getElementById('nextBtn').onclick = async () => {
                if (curPage < totalPage) await renderPage(++curPage);
                updateBtnStatus();
            };
            
            document.getElementById('pageNum').onkeydown = async (e) => {
                if (e.key === 'Enter') {
                    const num = parseInt(e.target.value);
                    if (num >= 1 && num <= totalPage) {
                        curPage = num;
                        await renderPage(curPage);
                        updateBtnStatus();
                    } else {
                        e.target.value = curPage;
                    }
                }
            };
        };

       
        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const canvas = document.getElementById('pdfCanvas');
            const viewport = page.getViewport({scale: window.devicePixelRatio * 2});
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
            document.getElementById('pageNum').value = pageNum;
        }

        
        function updateBtnStatus() {
            document.getElementById('prevBtn').disabled = curPage === 1;
            document.getElementById('nextBtn').disabled = curPage === totalPage;
        }
    </script>
</body>
</html>
